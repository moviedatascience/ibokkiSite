<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ibokki{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Add Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-gray-800 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'landing' %}" class="text-xl font-bold">Ibokki</a>
            <div class="space-x-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}" class="hover:text-gray-300">Profile</a>
                    <a href="{% url 'watch' %}" class="hover:text-gray-300">Watch</a>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="bg-transparent text-white hover:text-gray-300 border-0 p-0 cursor-pointer">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'discord_login' %}" class="hover:text-gray-300">Login with Discord</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </main>

    {% block extra_js %}
    {% endblock %}
</body>
</html>
