<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ibokki{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
        }
        .bg-youtube-dark { background-color: #0f0f0f; }
        .bg-youtube-secondary { background-color: #272727; }
        .bg-youtube-nav { background-color: #121212; }
        .text-youtube-primary { color: #f1f1f1; }
        .text-youtube-secondary { color: #aaaaaa; }
        .border-youtube { border-color: #303030; }
        .hover\:bg-youtube-secondary:hover { background-color: #272727; }
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background-color: #272727;
            border: 1px solid #303030;
            border-radius: 0.5rem;
            min-width: 200px;
            z-index: 1000;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            display: block;
            padding: 0.75rem 1rem;
            color: #f1f1f1;
            text-decoration: none;
        }
        .dropdown-item:hover { background-color: #303030; }
        .dropdown-divider {
            height: 1px;
            background-color: #303030;
            margin: 0.5rem 0;
        }
        .inline-emote {
            height: 1.5em;
            vertical-align: middle;
        }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">

    <!-- FIXED NAVIGATION BAR -->
    <nav id="main-nav"
         class="{% block nav_classes %}fixed top-0 left-0 w-full h-[3.5rem] z-40 bg-youtube-nav text-youtube-primary px-4 flex justify-between items-center transition-all ease-in-out duration-200{% endblock %}">
        <a href="{% url 'landing' %}" class="text-xl font-bold">Ibokki</a>
        <div class="flex items-center">
            {% if user.is_authenticated %}
                <div class="relative">
                    <button 
                        id="profileDropdownBtn"
                        class="w-10 h-10 rounded-full bg-youtube-secondary flex items-center justify-center hover:bg-youtube-secondary focus:outline-none"
                    >
                        <i class="fas fa-user text-youtube-primary"></i>
                    </button>
                    <div id="profileDropdown" class="dropdown-menu">
                        <a href="{% url 'profile' %}" class="dropdown-item">
                            <i class="fas fa-user-circle mr-2"></i> Profile
                        </a>
                        <div class="dropdown-divider"></div>
                        <form action="{% url 'logout' %}" method="post" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item w-full text-left">
                                <i class="fas fa-sign-out-alt mr-2"></i> Logout
                            </button>
                        </form>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'discord_login' %}" class="hover:text-youtube-secondary">
                    Login with Discord
                </a>
            {% endif %}
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="{% block main_classes %}w-full pt-[3.5rem]{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}

    <!-- Dropdown and Chat-Aware Nav Positioning Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const dropdownBtn = document.getElementById('profileDropdownBtn');
            const dropdownMenu = document.getElementById('profileDropdown');
            const nav = document.getElementById('main-nav');

            // Dropdown toggle logic
            if (dropdownBtn && dropdownMenu) {
                dropdownBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    dropdownMenu.classList.toggle('show');
                });
                document.addEventListener('click', function (e) {
                    if (!dropdownBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                        dropdownMenu.classList.remove('show');
                    }
                });
            }

            // Optional: Detect chat side (if toggling client-side)
            const chatPane = document.getElementById('chat-pane');
            if (chatPane) {
                if (chatPane.classList.contains('right-0')) {
                    nav.classList.add('pr-[24rem]');
                    nav.classList.remove('pl-[24rem]');
                } else if (chatPane.classList.contains('left-0')) {
                    nav.classList.add('pl-[24rem]');
                    nav.classList.remove('pr-[24rem]');
                } else {
                    nav.classList.remove('pl-[24rem]', 'pr-[24rem]');
                }
            }
        });
    </script>
</body>
</html>
