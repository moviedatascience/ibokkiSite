{% extends "home/base.html" %}
{% block content %}
<div class="container mx-auto px-4 py-8 pt-[4.5rem] max-w-3xl space-y-4">

    <div>
        <a href="{% url 'forum_category' category.slug %}" class="text-xs text-youtube-secondary hover:text-youtube-primary">&larr; {{ category.name }}</a>
        <h1 class="text-2xl font-bold text-youtube-primary">New Thread</h1>
    </div>

    {% if messages %}{% for m in messages %}<p class="text-sm text-red-400">{{ m }}</p>{% endfor %}{% endif %}

    <form method="post" class="rounded-lg border border-youtube bg-youtube-primary p-4 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-youtube-primary mb-1">Title</label>
            <input type="text" name="title" maxlength="200" required
                class="w-full bg-youtube-secondary text-white placeholder:text-gray-500 px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-youtube-primary mb-1">Message</label>
            <textarea name="content" rows="8" required
                class="w-full bg-youtube-secondary text-white placeholder:text-gray-500 px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 resize-y"></textarea>
        </div>
        <div class="text-right">
            <button type="submit" class="bg-[#ff0000] text-youtube-primary px-5 py-2 rounded-lg hover:bg-[#cc0000] text-sm">Create Thread</button>
        </div>
    </form>

</div>
{% endblock %}
