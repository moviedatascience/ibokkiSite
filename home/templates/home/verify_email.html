<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Ibokki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>body { background-color: #0f0f0f; color: #f1f1f1; }</style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white tracking-tight">Ibokki</h1>
        </div>
        <div class="bg-[#1a1a1a] rounded-xl p-8 border border-[#303030] shadow-2xl text-center">
            <div class="text-red-400 mb-4"><i class="fas fa-exclamation-triangle text-4xl"></i></div>
            <h2 class="text-xl font-semibold text-white mb-3">Invalid or Expired Link</h2>
            <p class="text-gray-400 text-sm mb-6">
                This verification link is invalid, has already been used, or has expired.
                You can register again to receive a fresh link.
            </p>
            <div class="flex gap-3 justify-center">
                <a href="{% url 'register' %}" class="inline-block py-2.5 px-6 bg-[#ff0000] text-white font-medium rounded-lg hover:bg-[#cc0000] transition">Register</a>
                <a href="{% url 'login' %}" class="inline-block py-2.5 px-6 bg-[#272727] text-white font-medium rounded-lg hover:opacity-80 transition">Login</a>
            </div>
        </div>
    </div>
</body>
</html>
