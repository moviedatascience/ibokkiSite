<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ibokki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <!-- Logo / Branding -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white tracking-tight">Ibokki</h1>
            <p class="text-gray-400 mt-2 text-sm">Streaming community</p>
        </div>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg text-sm
                    {% if message.tags == 'error' %}bg-red-500/20 text-red-400 border border-red-500/30
                    {% elif message.tags == 'success' %}bg-green-500/20 text-green-400 border border-green-500/30
                    {% else %}bg-blue-500/20 text-blue-400 border border-blue-500/30{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <div class="bg-[#1a1a1a] rounded-xl p-8 border border-[#303030] shadow-2xl">
            <h2 class="text-xl font-semibold text-white mb-6">Sign In</h2>
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                           class="w-full px-4 py-2.5 bg-[#0f0f0f] border border-[#303030] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                           placeholder="Enter your username">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-2.5 bg-[#0f0f0f] border border-[#303030] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                           placeholder="Enter your password">
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" name="remember_me" value="1"
                               class="w-4 h-4 rounded border-[#303030] bg-[#0f0f0f] text-red-500 focus:ring-red-500 focus:ring-offset-0 cursor-pointer">
                        <span class="ml-2 text-sm text-gray-400">Remember me</span>
                    </label>
                    <a href="{% url 'forgot_password' %}" class="text-sm text-red-400 hover:text-red-300 transition">
                        Forgot password?
                    </a>
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-[#ff0000] text-white font-medium rounded-lg hover:bg-[#cc0000] focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-[#1a1a1a] transition">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-gray-500 text-xs mt-6">
            Need an account?
            <a href="{% url 'register' %}" class="text-red-400 hover:text-red-300 transition">Sign up</a>
        </p>
    </div>
</body>
</html>
