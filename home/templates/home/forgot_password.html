<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Ibokki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <!-- Logo / Branding -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white tracking-tight">Ibokki</h1>
            <p class="text-gray-400 mt-2 text-sm">Reset your password</p>
        </div>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg text-sm
                    {% if message.tags == 'error' %}bg-red-500/20 text-red-400 border border-red-500/30
                    {% elif message.tags == 'success' %}bg-green-500/20 text-green-400 border border-green-500/30
                    {% else %}bg-blue-500/20 text-blue-400 border border-blue-500/30{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Forgot Password Form -->
        <div class="bg-[#1a1a1a] rounded-xl p-8 border border-[#303030] shadow-2xl">
            <h2 class="text-xl font-semibold text-white mb-2">Forgot Password</h2>
            <p class="text-gray-400 text-sm mb-6">
                Enter the email address associated with your account and we'll send you a link to reset your password.
            </p>
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
                    <input type="email" id="email" name="email" required autofocus
                           class="w-full px-4 py-2.5 bg-[#0f0f0f] border border-[#303030] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition"
                           placeholder="Enter your email">
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-[#ff0000] text-white font-medium rounded-lg hover:bg-[#cc0000] focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-[#1a1a1a] transition">
                    Send Reset Link
                </button>
            </form>
            <p class="text-center text-gray-500 text-xs mt-4">
                <a href="{% url 'login' %}" class="text-red-400 hover:text-red-300 transition">Back to login</a>
            </p>
        </div>
    </div>
</body>
</html>
