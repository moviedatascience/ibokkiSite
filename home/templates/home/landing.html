{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ibokki Landing</title>
  <!-- Bootstrap CSS (Optional but recommended for easy modals) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
  >

  <link rel="stylesheet" href="{% static 'home/css/landing.css' %}">
</head>
<body>

<!-- Navigation Bar -->
<header class="top-nav">
  <div class="nav-left">
    <a href="{% url 'landing' %}" class="nav-link">Home</a>
    <a href="{% url 'watch' %}" class="nav-link">Watch</a>
    <a href="#" class="nav-link">Merch</a>
  </div>
  <div class="nav-right">
    {% if is_authenticated %}
      <a href="{% url 'profile' %}" class="btn btn-primary">
        <i class="fas fa-user"></i> Profile
      </a>
    {% else %}
      <button
        type="button"
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#authModal"
      >
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    {% endif %}
  </div>
</header>


<!-- Existing landing content -->
<div class="landing-container">
  {% if is_stream_live %}
    <img
      src="{% static 'home/images/online.jpg' %}"
      alt="Stream is Live"
      class="landing-main-image"
    />
    <h2 class="landing-title">{{ current_stream_title }}</h2>
  {% else %}
    <img
      src="{% static 'home/images/offline.jpg' %}"
      alt="Stream is Offline"
      class="landing-main-image"
    />
    <h2 class="landing-title">The Stream is Currently Offline</h2>
  {% endif %}

  <div class="landing-buttons">
    <a href="#" class="landing-button">Subscribe</a>
    <a href="#" class="landing-button">Watch with Live Chat</a>
  </div>
</div>


<!-- MODAL: Sign Up or Log In -->
<div
  class="modal fade"
  id="authModal"
  tabindex="-1"
  aria-labelledby="authModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="authModalLabel">Sign In with Discord</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>

      <div class="modal-body">
        <a href="{% url 'discord_login' %}" class="btn btn-primary w-100">
          <i class="fab fa-discord"></i> Continue with Discord
        </a>

        <div class="form-check mt-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="rememberMeCheck"
          >
          <label class="form-check-label" for="rememberMeCheck">
            Remember Me
          </label>
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          Close
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Add Font Awesome for icons -->
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
>

<!-- Bootstrap JS (for modals) -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
></script>

</body>
</html>
