{% extends "home/base.html" %}

{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-8 pt-[4.5rem]">
    <div class="flex flex-col">
        <!-- Main Content Section -->
        <div class="w-full">
            <div class="relative rounded-lg overflow-hidden" style="padding-top: 56.25%;"> <!-- 16:9 aspect ratio -->
                <img
                    src="{% static 'home/images/online.jpg' %}"
                    alt="Stream is Live"
                    class="absolute top-0 left-0 w-full h-full object-cover"
                />
            </div>
            <div class="mt-4">
                <h1 class="text-2xl font-bold text-youtube-primary">{{ current_stream_title }}</h1>
                <p class="text-youtube-secondary mt-2">Stream is Live on Kick</p>
                <div class="mt-6 flex gap-4">
                    <a href="{% url 'watch' %}" class="bg-[#ff0000] text-youtube-primary px-6 py-3 rounded-lg hover:bg-[#cc0000] focus:outline-none focus:ring-2 focus:ring-red-500 transition-colors">
                        Watch Stream
                    </a>
                    <a href="#" class="bg-youtube-secondary text-youtube-primary px-6 py-3 rounded-lg hover:bg-youtube-secondary focus:outline-none focus:ring-2 focus:ring-gray-500 transition-colors">
                        Subscribe
                    </a>
                </div>
                <div class="mt-8 p-4 bg-youtube-secondary rounded-lg border border-youtube">
                    <h3 class="font-semibold mb-2 text-youtube-primary">Stream Information</h3>
                    <p class="text-sm text-youtube-secondary">Join our community to watch streams, chat with other viewers, and get notified when we go live!</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
