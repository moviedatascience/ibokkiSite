{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ibokki Landing</title>
  <!-- Bootstrap CSS (Optional but recommended for easy modals) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
  >

  <link rel="stylesheet" href="{% static 'home/css/landing.css' %}">
</head>
<body>

<!-- Navigation Bar -->
<header class="top-nav">
  <div class="nav-left">
    <!-- Keep your existing nav links or modify them as needed -->
    <a href="#" class="nav-link">Home</a>
    <a href="#" class="nav-link">Watch</a>
    <a href="#" class="nav-link">Merch</a>
  </div>
  <div class="nav-right">
    <!-- Instead of a plain link, we use a button that triggers our modal -->
    <button
      type="button"
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#authModal"
    >
      Sign Up or Log In
    </button>
  </div>
</header>


<!-- Existing landing content -->
<div class="landing-container">
  {% if is_stream_live %}
    <img
      src="{% static 'home/images/online.jpg' %}"
      alt="Stream is Live"
      class="landing-main-image"
    />
    <h2 class="landing-title">{{ current_stream_title }}</h2>
  {% else %}
    <img
      src="{% static 'home/images/offline.jpg' %}"
      alt="Stream is Offline"
      class="landing-main-image"
    />
    <h2 class="landing-title">The Stream is Currently Offline</h2>
  {% endif %}

  <div class="landing-buttons">
    <a href="#" class="landing-button">Subscribe</a>
    <a href="#" class="landing-button">Watch with Live Chat</a>
  </div>
</div>


<!-- MODAL: Sign Up or Log In -->
<div
  class="modal fade"
  id="authModal"
  tabindex="-1"
  aria-labelledby="authModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="authModalLabel">Sign Up or Log In</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>

      <div class="modal-body">
        <!-- "Continue with Discord" link -->
        <a
          href="{% url 'discord_login' %}"
          id="discord-link"
          class="btn btn-secondary"
        >
          Continue with Discord
        </a>

        <!-- "Remember Me" checkbox -->
        <div class="form-check mt-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="rememberMeCheck"
          >
          <label class="form-check-label" for="rememberMeCheck">
            Remember Me
          </label>
        </div>

        <!-- Move the script BELOW the checkbox so 'rememberMeCheck' exists -->
        <script>
          // Attach the click event after the checkbox is in the DOM
          const discordLink = document.getElementById("discord-link");
          const rememberCheck = document.getElementById("rememberMeCheck");

          discordLink.addEventListener("click", function(e) {
            e.preventDefault();
            const baseUrl = "{% url 'discord_login' %}";
            const param = rememberCheck.checked ? "?remember_me=1" : "";
            window.location.href = baseUrl + param;
          });
        </script>

      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          Close
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS (for modals) -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
></script>

</body>
</html>
