{% extends "home/base.html" %}
{% load static %}

{% block main_classes %}p-0 h-full w-full overflow-hidden{% endblock %}

{% block content %}
<div id="watch-flex-wrapper" class="flex flex-col md:flex-row h-full w-full min-h-0 pt-[3.5rem]">
    <!-- Left Chat Panel (empty container; chat panel is moved here via JS when toggled) -->
    <div id="chat-left" class="hidden w-[24rem] h-full flex flex-col bg-youtube-secondary border-r border-youtube-primary z-30 min-h-0">
    </div>

    <!-- Main Column (Stream) -->
    <div id="stream-area" class="flex-grow h-full flex flex-col min-h-0 min-w-0">
        <div class="flex-grow bg-black min-h-0 min-w-0 flex items-center justify-center">
            <div class="relative w-full h-full max-h-[calc(100vh-3.5rem)] flex items-center justify-center">
                <div class="w-full h-full flex items-center justify-center">
                    <iframe src="{{ embed_url|default:'' }}"
                            class="w-full h-full"
                            allowfullscreen
                            sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
                            style="border: none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Chat Panel -->
    <div id="chat-right" class="w-[24rem] h-full flex flex-col bg-youtube-secondary border-l border-youtube-primary z-30 min-h-0">
        {% include "home/chat_panel.html" %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'home/js/chat.js' %}"></script>
<script>
    // Chat side toggle logic (desktop only)
    let chatOnRight = true;
    const chatLeft = document.getElementById('chat-left');
    const chatRight = document.getElementById('chat-right');
    const moveChatBtns = document.querySelectorAll('#chat-side-toggle');

    function isDesktop() {
        return window.matchMedia('(min-width: 768px)').matches;
    }

    function updateChatPosition() {
        const target = (!isDesktop() || chatOnRight) ? chatRight : chatLeft;
        const source = (target === chatRight) ? chatLeft : chatRight;

        // Move chat panel content to the target container
        if (target.children.length === 0 && source.children.length > 0) {
            while (source.firstChild) {
                target.appendChild(source.firstChild);
            }
        }

        // Show target, hide source
        target.classList.remove('hidden');
        source.classList.add('hidden');
    }

    moveChatBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            if (isDesktop()) {
                chatOnRight = !chatOnRight;
                updateChatPosition();
            }
        });
    });

    // Initialize position
    updateChatPosition();
    window.addEventListener('resize', updateChatPosition);

    // --- SPA Stream Switching Logic ---
    const streams = JSON.parse('{{ streams_json|escapejs }}');
    const selectEls = document.querySelectorAll('#stream-select');
    const iframe = document.querySelector('iframe');
    let currentStreamKey = '{{ current_stream.platform }}/{{ current_stream.channel_slug }}';

    selectEls.forEach(select => {
        select.addEventListener('change', function() {
            const streamKey = this.value;
            const stream = streams[streamKey];
            if (stream && stream.embed_url) {
                iframe.src = stream.embed_url;
                window.location.hash = '#' + streamKey;
                currentStreamKey = streamKey;
                
                // Switch chat to new stream
                const streamId = streamKey.replace('/', '_');
                if (window.chatUI && window.chatUI.chatClient) {
                    window.chatUI.chatClient.switchStream(streamId);
                }
            }
        });
    });

    // --- Enhanced WebSocket Chat Integration ---
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    
    console.log('Chat elements found:', {
        chatMessages: !!chatMessages,
        chatForm: !!chatForm,
        chatInput: !!chatInput
    });

    // Initialize chat client
    let chatClient = null;
    let chatUI = null;

    if (chatMessages && chatForm && chatInput) {
        // Create chat client with options
        chatClient = new ChatClient({
            reconnectInterval: 1000,
            maxReconnectAttempts: 10,
            pingInterval: 30000,
            pongTimeout: 10000
        });

        // Create chat UI manager
        chatUI = new ChatUI(chatClient, {
            maxMessages: 100
        });

        // Initialize UI
        if (chatUI.init('#chat-messages', '#chat-form', '#chat-input')) {
            // Connect to current stream's chat
            const initialStreamId = currentStreamKey ? currentStreamKey.replace('/', '_') : 'general';
            chatClient.connect(initialStreamId);
            
            // Make globally accessible for stream switching
            window.chatUI = chatUI;
            window.chatClient = chatClient;
        } else {
            console.error('Failed to initialize chat UI');
        }
    } else {
        console.warn('Chat elements not found, chat will not be initialized');
    }

    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
        if (chatClient) {
            chatClient.disconnect();
        }
    });
</script>
{% endblock %}
