{% extends "home/base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-4">
        <!-- Stream Section -->
        <div class="lg:w-3/4">
            <div class="relative" style="padding-top: 56.25%;"> <!-- 16:9 aspect ratio -->
                <iframe
                    src="https://player.kick.com/{{ channel_slug }}"
                    height="720"
                    width="1280"
                    frameborder="0"
                    scrolling="no"
                    allowfullscreen="true"
                    class="absolute top-0 left-0 w-full h-full"
                    sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
                ></iframe>
            </div>
            <div class="mt-4">
                <h1 class="text-2xl font-bold text-gray-100">{{ stream_title }}</h1>
                <p class="text-gray-400">Streaming on Kick</p>
                <div class="mt-2 p-4 bg-gray-800 rounded border border-gray-700">
                    <h3 class="font-semibold mb-2 text-gray-200">Debug Information:</h3>
                    <p class="text-sm text-gray-400">Channel: {{ channel_slug }}</p>
                    <p class="text-sm text-gray-400">Status: Live</p>
                </div>
            </div>
        </div>

        <!-- Chat Section -->
        <div class="lg:w-1/4">
            <div class="bg-gray-800 rounded-lg h-[600px] flex flex-col border border-gray-700">
                <div class="p-4 border-b border-gray-700">
                    <h2 class="text-lg font-semibold text-gray-100">Chat</h2>
                </div>
                
                <!-- Chat Messages -->
                <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-messages">
                    <!-- Messages will be inserted here -->
                </div>

                <!-- Chat Input -->
                <div class="p-4 border-t border-gray-700">
                    <form id="chat-form" class="flex gap-2">
                        <input
                            type="text"
                            id="chat-input"
                            class="flex-1 bg-gray-700 text-gray-100 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-gray-600"
                            placeholder="Type a message..."
                            {% if not user.is_authenticated %}disabled{% endif %}
                        >
                        <button
                            type="submit"
                            class="bg-blue-600 text-gray-100 px-4 py-2 rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            {% if not user.is_authenticated %}disabled{% endif %}
                        >
                            Send
                        </button>
                    </form>
                    {% if not user.is_authenticated %}
                    <p class="text-sm text-gray-400 mt-2">
                        Please <a href="{% url 'discord_login' %}" class="text-blue-400 hover:underline">login</a> to chat
                    </p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (message) {
            // TODO: Implement chat message sending
            chatInput.value = '';
        }
    });
});
</script>
{% endblock %}
{% endblock %}
