{% extends "home/base.html" %}
{% load static %}

{% block content %}
<div class="flex flex-col lg:flex-row h-screen w-screen overflow-hidden">
    <!-- Stream Container -->
    <div class="flex-1 bg-black flex items-center justify-center min-w-0">
        {% if embed_url %}
            <iframe 
                src="{{ embed_url }}" 
                class="w-full h-full aspect-video"
                allowfullscreen
                sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
            ></iframe>
        {% elif current_stream.platform == 'youtube' %}
            <!-- YouTube Offline Screen -->
            <div class="flex flex-col items-center justify-center w-full h-full p-4 text-center">
                <img src="{% static 'home/images/offline.jpg' %}" alt="Stream Offline" class="w-full h-full object-contain">
                <div class="flex gap-4 mt-4">
                    <a href="https://www.youtube.com/channel/{{ current_stream.youtube_channel_id }}" target="_blank" class="bg-[#ff0000] text-white px-6 py-2 rounded-lg hover:bg-[#cc0000] transition-colors">
                        Visit Channel
                    </a>
                    <button onclick="window.location.reload()" class="bg-youtube-primary text-youtube-secondary px-6 py-2 rounded-lg hover:bg-gray-700 transition-colors">
                        Refresh
                    </button>
                </div>
            </div>
        {% else %}
            <div class="p-4 text-center text-youtube-primary">
                Stream is not available
            </div>
        {% endif %}
    </div>

    <!-- Chat Container -->
    <div class="w-full lg:w-96 flex flex-col h-1/2 lg:h-full bg-youtube-secondary border-l border-youtube-primary">
        <!-- Stream Selector -->
        <div class="p-4 border-b border-youtube-primary bg-youtube-secondary">
            <select id="stream-select" class="w-full bg-youtube-primary text-youtube-secondary px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                {% for stream in active_streams %}
                    <option value="{{ stream.channel_slug }}" {% if stream.channel_slug == current_stream %}selected{% endif %}>
                        {{ stream.channel_slug }} ({{ stream.get_platform_display }}){% if stream.is_featured %} [Featured]{% endif %}
                    </option>
                {% endfor %}
            </select>
        </div>
        <!-- Chat Header -->
        <div class="p-4 border-b border-youtube-primary">
            <h2 class="text-youtube-primary font-semibold">Chat</h2>
        </div>
        <!-- Chat Messages -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2">
            <!-- Messages inserted here -->
        </div>
        <!-- Chat Input -->
        <div class="p-4 border-t border-youtube-primary">
            {% if user.is_authenticated %}
                <form id="chat-form" class="flex gap-2">
                    <input 
                        type="text" 
                        id="chat-input" 
                        class="flex-1 bg-youtube-primary text-youtube-secondary px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
                        placeholder="Type a message..."
                        maxlength="{{ CHAT_MESSAGE_MAX_LENGTH }}"
                    >
                    <button 
                        type="submit"
                        class="bg-[#ff0000] text-youtube-primary px-4 py-2 rounded-lg hover:bg-[#cc0000] focus:outline-none focus:ring-2 focus:ring-red-500 transition-colors"
                    >
                        Send
                    </button>
                </form>
            {% else %}
                <div class="text-center">
                    <a 
                        href="{% url 'discord_login' %}?next=/watch/" 
                        class="text-youtube-primary hover:text-youtube-secondary"
                    >
                        Login to chat
                    </a>
                </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
