{% extends "home/base.html" %}
{% load static %}

{% block main_classes %}p-0 h-full w-full overflow-hidden{% endblock %}

{% block content %}
<div id="watch-flex-wrapper" class="flex flex-col md:flex-row h-full w-full min-h-0 pt-[3.5rem]">
    <!-- Left Chat Panel -->
    <div id="chat-left" class="hidden w-[24rem] h-full flex flex-col bg-youtube-secondary border-r border-youtube-primary z-30 min-h-0">
        {% include "home/chat_panel.html" %}
    </div>

    <!-- Main Column (Stream) -->
    <div id="stream-area" class="flex-grow h-full flex flex-col min-h-0 min-w-0">
        <div class="flex-grow bg-black min-h-0 min-w-0 flex items-center justify-center">
            <div class="relative w-full h-full max-h-[calc(100vh-3.5rem)] flex items-center justify-center">
                <div class="w-full h-full flex items-center justify-center">
                    <iframe src="{{ embed_url|default:'' }}"
                            class="w-full h-full"
                            allowfullscreen
                            sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
                            style="border: none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Chat Panel -->
    <div id="chat-right" class="w-[24rem] h-full flex flex-col bg-youtube-secondary border-l border-youtube-primary z-30 min-h-0">
        {% include "home/chat_panel.html" %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Chat side toggle logic (desktop only)
    let chatOnRight = true;
    const chatLeft = document.getElementById('chat-left');
    const chatRight = document.getElementById('chat-right');
    const moveChatBtns = document.querySelectorAll('#chat-side-toggle');

    function isDesktop() {
        return window.matchMedia('(min-width: 768px)').matches;
    }

    function updateChatPosition() {
        if (!isDesktop()) {
            chatRight.classList.remove('hidden');
            chatLeft.classList.add('hidden');
            return;
        }
        if (chatOnRight) {
            chatRight.classList.remove('hidden');
            chatLeft.classList.add('hidden');
        } else {
            chatLeft.classList.remove('hidden');
            chatRight.classList.add('hidden');
        }
    }

    moveChatBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            if (isDesktop()) {
                chatOnRight = !chatOnRight;
                updateChatPosition();
            }
        });
    });

    // Initialize position
    updateChatPosition();
    window.addEventListener('resize', updateChatPosition);

    // --- SPA Stream Switching Logic ---
    const streams = JSON.parse('{{ streams_json|escapejs }}');
    const selectEls = document.querySelectorAll('#stream-select');
    const iframe = document.querySelector('iframe');

    selectEls.forEach(select => {
        select.addEventListener('change', function() {
            const stream = streams[this.value];
            if (stream && stream.embed_url) {
                iframe.src = stream.embed_url;
                window.location.hash = '#' + this.value;
            }
        });
    });

    // --- WebSocket Chat Integration ---
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    let chatSocket = null;
    
    console.log('Chat elements found:', {
        chatMessages: !!chatMessages,
        chatForm: !!chatForm,
        chatInput: !!chatInput
    });

    function connectChatSocket() {
        const wsScheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const wsPath = wsScheme + '://' + window.location.host + '/ws/chat/';
        console.log('Attempting to connect to WebSocket:', wsPath);
        chatSocket = new WebSocket(wsPath);

        chatSocket.onopen = function(e) {
            console.log('Chat WebSocket connection established.');
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if (data.history) {
                // Load chat history
                chatMessages.innerHTML = '';
                data.history.forEach(msg => {
                    appendMessage(msg);
                });
            } else if (data.message) {
                // Append new message
                appendMessage(data);
            } else if (data.command === 'clear') {
                // Clear chat messages
                chatMessages.innerHTML = '';
            } else if (data.error) {
                console.error('Chat error:', data.error);
            }
        };

        chatSocket.onclose = function(e) {
            console.log('Chat WebSocket connection closed.');
            setTimeout(connectChatSocket, 1000);
        };

        chatSocket.onerror = function(e) {
            console.error('Chat WebSocket error:', e);
        };
    }

    function appendMessage(data) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'text-youtube-primary';
        messageDiv.innerHTML = `<strong>${data.user}</strong>: ${data.message}`;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    if (chatForm) {
        chatForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (message && chatSocket && chatSocket.readyState === WebSocket.OPEN) {
                chatSocket.send(JSON.stringify({ message: message }));
                chatInput.value = '';
            }
        });
    }

    connectChatSocket();
</script>
{% endblock %}
