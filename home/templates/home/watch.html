{% extends "home/base.html" %}
{% load static %}

{% block main_classes %}p-0 h-full w-full overflow-hidden{% endblock %}

{% block content %}
<div id="watch-flex-wrapper" class="flex flex-col md:flex-row h-full w-full min-h-0 pt-[3.5rem]">
    <!-- Left Chat Panel -->
    <div id="chat-left" class="hidden w-[24rem] h-full flex-col bg-youtube-secondary border-r border-youtube-primary z-30 min-h-0">
        {% include "home/chat_panel.html" %}
    </div>

    <!-- Main Column (Stream) -->
    <div id="stream-area" class="flex-grow h-full flex flex-col min-h-0 min-w-0">
        <div class="flex-grow bg-black min-h-0 min-w-0 flex items-center justify-center">
            <div class="relative w-full max-w-full h-full max-h-[calc(100vh-3.5rem)] flex items-center justify-center">
                <div class="aspect-[16/9] w-auto h-auto max-w-full max-h-full bg-black">
                    <iframe src="{{ embed_url|default:'' }}"
                            class="w-full h-full"
                            allowfullscreen
                            sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
                            style="border: none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Chat Panel -->
    <div id="chat-right" class="hidden w-[24rem] h-full flex-col bg-youtube-secondary border-l border-youtube-primary z-30 min-h-0">
        {% include "home/chat_panel.html" %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Chat side toggle logic (desktop only)
    let chatOnRight = true;
    const chatLeft = document.getElementById('chat-left');
    const chatRight = document.getElementById('chat-right');
    const moveChatBtns = document.querySelectorAll('#chat-side-toggle');

    function isDesktop() {
        return window.matchMedia('(min-width: 768px)').matches;
    }

    function updateChatPosition() {
        if (!isDesktop()) {
            chatRight.classList.remove('hidden');
            chatLeft.classList.add('hidden');
            return;
        }
        if (chatOnRight) {
            chatRight.classList.remove('hidden');
            chatLeft.classList.add('hidden');
        } else {
            chatLeft.classList.remove('hidden');
            chatRight.classList.add('hidden');
        }
    }

    moveChatBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            if (isDesktop()) {
                chatOnRight = !chatOnRight;
                updateChatPosition();
            }
        });
    });

    // Initialize position
    updateChatPosition();
    window.addEventListener('resize', updateChatPosition);

    // --- SPA Stream Switching Logic ---
    const streams = JSON.parse('{{ streams_json|escapejs }}');
    const selectEls = document.querySelectorAll('#stream-select');
    const iframe = document.querySelector('iframe');

    function setStreamFromHash() {
        let hash = window.location.hash.replace('#', '');
        if (!hash || !streams[hash]) {
            // Default to featured stream
            for (const key in streams) {
                if (streams[key].is_featured) {
                    hash = key;
                    window.location.hash = '#' + key;
                    break;
                }
            }
        }
        if (streams[hash]) {
            // Update iframe src
            if (iframe && streams[hash].embed_url) {
                iframe.src = streams[hash].embed_url;
            } else if (iframe) {
                iframe.src = '';
            }
            // Update dropdowns
            selectEls.forEach(sel => { sel.value = hash; });
        }
    }

    // On dropdown change, update hash (no reload)
    selectEls.forEach(sel => {
        sel.addEventListener('change', function(e) {
            window.location.hash = '#' + e.target.value;
        });
    });

    // On hash change, update stream
    window.addEventListener('hashchange', setStreamFromHash);
    // On page load, set stream
    setStreamFromHash();
</script>
{% endblock %}
