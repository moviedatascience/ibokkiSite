{% extends "home/base.html" %}
{% load static %}

{% block content %}
<div class="stream-container">
    <div class="stream-player">
        {% if channel_slug %}
            <iframe
                src="{{ embed_url }}"
                width="100%"
                height="100%"
                frameborder="0"
                scrolling="no"
                allowfullscreen
                sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
            ></iframe>
        {% else %}
            <div class="no-stream">
                <h2>No Stream Available</h2>
                <p>Please check back later or select another stream.</p>
            </div>
        {% endif %}
    </div>
    
    <div class="stream-selector">
        <select id="stream-select" class="form-select">
            {% for stream in active_streams %}
                <option value="{{ stream.channel_slug }}" {% if stream.channel_slug == current_stream %}selected{% endif %}>
                    {{ stream.channel_slug }} ({{ stream.get_platform_display }}){% if stream.is_featured %} [Featured]{% endif %}
                </option>
            {% endfor %}
        </select>
    </div>
</div>

<style>
.stream-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 60px);
    gap: 20px;
    padding: 20px;
}

.stream-player {
    flex: 1;
    background: #1a1a1a;
    border-radius: 8px;
    overflow: hidden;
}

.stream-selector {
    padding: 10px;
    background: #1a1a1a;
    border-radius: 8px;
}

.form-select {
    width: 100%;
    padding: 8px;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    color: #fff;
}

.no-stream {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #666;
}

iframe {
    border: none;
}
</style>

<script>
document.getElementById('stream-select').addEventListener('change', function(e) {
    const streamSlug = e.target.value;
    const formData = new FormData();
    formData.append('stream_slug', streamSlug);
    
    fetch('/switch-stream/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            window.location.reload();
        }
    })
    .catch(error => console.error('Error:', error));
});
</script>
{% endblock %}
