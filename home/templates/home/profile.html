<!-- home/profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="container mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-4">Profile Page</h1>
    <p class="mb-2">Username: {{ user.username }}</p>
    <p class="mb-4">Email: {{ user.email }}</p>

    <div class="space-x-4">
      <a href="{% url 'watch' %}" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Go to Watch Page</a>
      <form method="post" action="{% url 'logout' %}" class="inline">
        {% csrf_token %}
        <button type="submit" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">Log Out</button>
      </form>
    </div>
  </div>
</body>
</html>
