<!-- Dropdown -->
<div class="p-4 border-b border-youtube-primary bg-youtube-secondary">
    <select id="stream-select" class="w-full bg-youtube-primary text-youtube-secondary px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
        {% for stream in active_streams %}
            <option value="{{ stream.platform }}/{{ stream.channel_slug }}" {% if stream == current_stream %}selected{% endif %}>
                {{ stream.channel_slug }} ({{ stream.get_platform_display }}){% if stream.is_featured %} [Featured]{% endif %}
            </option>
        {% endfor %}
    </select>
</div>

<!-- Header -->
<div class="p-4 border-b border-youtube-primary flex justify-between items-center">
    <div class="flex items-center gap-2">
        <h2 class="text-youtube-primary font-semibold">Chat</h2>
        <span id="chat-status" class="status-indicator disconnected text-lg">○</span>
    </div>
    <button id="chat-side-toggle" class="text-sm text-youtube-primary hover:text-youtube-secondary">Move Chat</button>
</div>

<!-- Chat Messages -->
<div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm"></div>

<!-- Input -->
<div class="p-4 border-t border-youtube-primary">
    <form id="chat-form" class="flex gap-2">
        <input type="text" id="chat-input" class="flex-1 bg-youtube-primary text-youtube-secondary px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Type a message..." maxlength="{{ CHAT_MESSAGE_MAX_LENGTH }}">
        <button type="submit" class="bg-[#ff0000] text-youtube-primary px-4 py-2 rounded-lg hover:bg-[#cc0000] focus:outline-none focus:ring-2 focus:ring-red-500 transition-colors">Send</button>
    </form>
    <div class="text-xs text-gray-400 mt-2">
        Commands: /clear (staff only), /timeout username [seconds] (staff only)
    </div>
</div>

<style>
.status-indicator.connected {
    color: #10b981; /* green */
}
.status-indicator.disconnected {
    color: #ef4444; /* red */
}
.chat-message {
    word-wrap: break-word;
    overflow-wrap: break-word;
}
.chat-error {
    background-color: rgba(239, 68, 68, 0.1);
    border-left: 3px solid #ef4444;
    padding-left: 8px;
}
.chat-timeout {
    background-color: rgba(245, 158, 11, 0.1);
    border-left: 3px solid #f59e0b;
    padding-left: 8px;
}
.inline-emote {
    display: inline-block;
    vertical-align: middle;
    height: 1.5em;
    margin: 0 2px;
}
</style>
