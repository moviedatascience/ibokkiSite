<!-- Dropdown -->
<div class="p-4 border-b border-youtube-primary bg-youtube-nav">
    <select id="stream-select" class="w-full bg-youtube-primary text-youtube-secondary px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
        {% for stream in active_streams %}
            <option value="{{ stream.platform }}/{{ stream.channel_slug }}" {% if stream == current_stream %}selected{% endif %}>
                {{ stream.channel_slug }} ({{ stream.get_platform_display }}){% if stream.is_featured %} [Featured]{% endif %}
            </option>
        {% endfor %}
    </select>
</div>

<!-- Header -->
<div class="px-3 py-2 border-b border-youtube-primary flex justify-between items-center">
    <h2 class="text-youtube-primary font-semibold text-sm">Chat</h2>
    <div class="flex items-center gap-1">
        <!-- Swap sides -->
        <button id="chat-side-toggle" class="p-1.5 text-gray-400 hover:text-white rounded transition-colors" title="Swap chat side">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
        </button>
        <!-- Pop-out -->
        <button id="chat-popout-btn" class="p-1.5 text-gray-400 hover:text-white rounded transition-colors" title="Pop out chat">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        </button>
        <!-- Collapse -->
        <button id="chat-collapse-btn" class="p-1.5 text-gray-400 hover:text-white rounded transition-colors" title="Collapse chat">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
        </button>
    </div>
</div>

<!-- Active Poll -->
<div id="poll-container" class="px-4 pt-2"></div>

<!-- Chat Messages -->
<div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm"></div>

<!-- Input -->
<div class="p-4 border-t border-youtube-primary relative">
    <!-- Slash command popup (hidden by default) -->
    <div id="slash-command-popup" class="hidden absolute bottom-full left-0 right-0 mx-4 mb-1 bg-[#1a1a2e] border border-gray-700 rounded-lg shadow-lg overflow-hidden z-50">
        <div id="slash-command-list" class="max-h-48 overflow-y-auto"></div>
    </div>
    <!-- Emote autocomplete popup (hidden by default) -->
    <div id="emote-autocomplete-popup" class="hidden absolute bottom-full left-0 right-0 mx-4 mb-1 bg-[#1a1a2e] border border-gray-700 rounded-lg shadow-lg overflow-hidden z-50">
        <div id="emote-autocomplete-list" class="max-h-48 overflow-y-auto"></div>
    </div>
    <!-- Emote picker popup (hidden by default) -->
    <div id="emote-picker-popup" class="hidden absolute bottom-full right-0 mx-4 mb-1 bg-[#1a1a2e] border border-gray-700 rounded-lg shadow-lg overflow-hidden z-50" style="width: 320px; max-width: calc(100% - 2rem);">
        <div class="p-2 border-b border-gray-700">
            <input type="text" id="emote-picker-search" autocomplete="off" placeholder="Search emotes..." class="w-full bg-youtube-primary text-white placeholder:text-gray-500 px-3 py-1.5 rounded text-sm focus:outline-none focus:ring-1 focus:ring-red-500">
        </div>
        <div id="emote-picker-grid" class="p-2"></div>
    </div>
    <form id="chat-form" class="flex gap-2">
        <input type="text" id="chat-input" autocomplete="off" class="flex-1 bg-youtube-primary text-white placeholder:text-gray-500 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Type a message..." maxlength="{{ CHAT_MESSAGE_MAX_LENGTH }}">
        <button type="button" id="emote-picker-btn" class="p-2 text-gray-500 hover:opacity-80 rounded-lg transition-colors" title="Emotes">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </button>
        <button type="button" id="eye-toggle-btn" class="p-2 text-gray-500 hover:opacity-80 rounded-lg transition-colors" title="Toggle stream viewer filter">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
        <button type="submit" class="bg-[#ff0000] text-youtube-primary px-4 py-2 rounded-lg hover:bg-[#cc0000] focus:outline-none focus:ring-2 focus:ring-red-500 transition-colors">Send</button>
    </form>
</div>

<style>
.chat-message {
    word-wrap: break-word;
    overflow-wrap: break-word;
}
.chat-error {
    background-color: rgba(239, 68, 68, 0.1);
    border-left: 3px solid #ef4444;
    padding-left: 8px;
}
.chat-timeout {
    background-color: rgba(245, 158, 11, 0.1);
    border-left: 3px solid #f59e0b;
    padding-left: 8px;
}
.chat-ban {
    background-color: rgba(239, 68, 68, 0.1);
    border-left: 3px solid #ef4444;
    padding-left: 8px;
}
.inline-emote {
    display: inline-block;
    vertical-align: middle;
    height: 1.5em;
    margin: 0 2px;
}
.chat-message-dimmed {
    opacity: 0.3;
}
#eye-toggle-btn.active {
    color: #3b82f6;
    background-color: rgba(59, 130, 246, 0.2);
}
#eye-toggle-btn.active svg {
    fill: rgba(59, 130, 246, 0.3);
}
.slash-cmd-item {
    padding: 6px 12px;
    cursor: pointer;
    transition: background-color 0.1s;
}
.slash-cmd-item:hover,
.slash-cmd-item.highlighted {
    background-color: rgba(255,255,255,0.08);
}
.slash-cmd-item .cmd-name {
    font-weight: 600;
    color: #e2e8f0;
    font-size: 13px;
}
.slash-cmd-item .cmd-usage {
    color: #94a3b8;
    font-size: 11px;
    margin-left: 6px;
}
.slash-cmd-item .cmd-desc {
    color: #64748b;
    font-size: 11px;
    display: block;
    margin-top: 1px;
}
.emote-suggestion {
    display: flex;
    align-items: center;
    gap: 8px;
}
.emote-suggestion-img {
    height: 24px;
    width: auto;
    flex-shrink: 0;
}
#emote-picker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
    gap: 4px;
    max-height: 240px;
    overflow-y: auto;
}
.emote-picker-item {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    transition: background-color 0.1s;
}
.emote-picker-item:hover {
    background-color: rgba(255,255,255,0.08);
}
.emote-picker-item img {
    max-height: 32px;
    max-width: 32px;
}
.emote-picker-empty {
    color: #64748b;
    font-size: 12px;
    text-align: center;
    padding: 16px;
}
</style>
