# nginx "SSO injector" that sits between the Cloudflare tunnel and Fluxer's
# Caddy. It transparently proxies everything to Caddy, and injects sso-auto.js
# into the login HTML so enforced-SSO auto-redirects to ibokki (zero clicks).
#
# The no-store header on /sso-auto.js is REQUIRED: without it Cloudflare edge-
# caches the script and changes never take effect.
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    server_name _;

    location = /sso-auto.js {
        alias /assets/sso-auto.js;
        default_type application/javascript;
        add_header Cache-Control "no-store, must-revalidate";
    }

    location / {
        proxy_pass http://caddy:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";        # so sub_filter sees uncompressed HTML
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</head>' '<script defer src="/sso-auto.js"></script></head>';
    }
}
